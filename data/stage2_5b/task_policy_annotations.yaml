        admissible_sources:
          - tool_name: get_order_details
            result_field: status
        required_before: [return_delivered_order_items, cancel_pending_order]
      - fact_id: returnable_item_ids
        description: Item IDs for skateboard, garden hose, backpack, keyboard, bed.
        admissible_sources:
          - tool_name: get_order_details
            result_field: items
        required_before: [return_delivered_order_items]
    critical_mutations:
      - tool_name: return_delivered_order_items
